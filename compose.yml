services:
  neo4j:
    image: neo4j:5
    container_name: steam-workshop-neo4j
    restart: unless-stopped
    ports:
      # Neo4j Browser
      - "7474:7474"
      # Bolt (用于驱动连接)
      - "7687:7687"
    environment:
      # 格式：username/password
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/please_change_me}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:

